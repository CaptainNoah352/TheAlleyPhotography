<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Three-column masonry photo gallery with shortest-column-first packing." />
    <title>Masonry Gallery</title>
    <link rel="stylesheet" href="masonry.css" />
  </head>
  <body>
    <section class="gallery-section">
      <div class="gallery-wrapper">
        <div class="gallery-masonry" id="masonryGallery">
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1015/1500/1013" class="masonry-image-link">
                <img src="https://picsum.photos/id/1015/1500/1013" width="1500" height="1013" alt="Mountain lake at sunrise" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1025/1200/1600" class="masonry-image-link">
                <img src="https://picsum.photos/id/1025/1200/1600" width="1200" height="1600" alt="Curious dog portrait" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1035/1500/1000" class="masonry-image-link">
                <img src="https://picsum.photos/id/1035/1500/1000" width="1500" height="1000" alt="Rocky coastline" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1042/1000/1500" class="masonry-image-link">
                <img src="https://picsum.photos/id/1042/1000/1500" width="1000" height="1500" alt="Forest waterfall" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1050/1600/1067" class="masonry-image-link">
                <img src="https://picsum.photos/id/1050/1600/1067" width="1600" height="1067" alt="Desert dunes" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1069/1100/1400" class="masonry-image-link">
                <img src="https://picsum.photos/id/1069/1100/1400" width="1100" height="1400" alt="Snowy mountain ridge" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1074/1400/933" class="masonry-image-link">
                <img src="https://picsum.photos/id/1074/1400/933" width="1400" height="933" alt="Winding road through hills" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1084/1000/1500" class="masonry-image-link">
                <img src="https://picsum.photos/id/1084/1000/1500" width="1000" height="1500" alt="Palm trees against sky" />
              </a>
            </div>
          </figure>
          <figure class="masonry-item">
            <div class="masonry-item-wrapper">
              <a href="https://picsum.photos/id/1081/1500/1000" class="masonry-image-link">
                <img src="https://picsum.photos/id/1081/1500/1000" width="1500" height="1000" alt="Calm ocean horizon" />
              </a>
            </div>
          </figure>
        </div>
      </div>
    </section>

    <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Image lightbox">
      <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close lightbox">×</button>
      <button class="lightbox-nav lightbox-prev" id="lightboxPrev" type="button" aria-label="Previous image">‹</button>
      <img class="lightbox-image" id="lightboxImage" src="" alt="" />
      <button class="lightbox-nav lightbox-next" id="lightboxNext" type="button" aria-label="Next image">›</button>
    </div>

    <script src="masonry.js"></script>
  </body>
</html>
